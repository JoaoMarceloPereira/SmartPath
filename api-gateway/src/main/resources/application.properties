spring.application.name=api-gateway
server.port=8081

# Configuração do Cliente Eureka (aponta para o eureka-server)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Habilita descoberta de rotas automáticas baseadas no nome do serviço no Eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Roteamento manual para o Logic Controller
spring.cloud.gateway.routes[0].id=logic-controller-route
spring.cloud.gateway.routes[0].uri=lb://logic-controller
spring.cloud.gateway.routes[0].predicates[0]=Path=/logic/**
